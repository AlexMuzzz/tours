name: CI

on:
  push:
  pull_request:

jobs:
  backend:
    name: Backend Tests
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: tour_catalog_test
          POSTGRES_USER: tour_user
          POSTGRES_PASSWORD: tour_password
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U tour_user -d tour_catalog_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    defaults:
      run:
        working-directory: apps/backend

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          extensions: mbstring, dom, fileinfo, pgsql, pdo_pgsql
          coverage: none
          tools: composer:v2

      - name: Expose PostgreSQL service hostname
        run: echo "127.0.0.1 postgres" | sudo tee -a /etc/hosts

      - name: Cache Composer dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.composer/cache/files
            apps/backend/vendor
          key: ${{ runner.os }}-php-8.3-${{ hashFiles('apps/backend/composer.lock') }}
          restore-keys: |
            ${{ runner.os }}-php-8.3-

      - name: Install backend dependencies
        run: composer install --no-interaction --prefer-dist --optimize-autoloader

      - name: Prepare Laravel environment
        run: |
          cp .env.example .env
          cp .env.testing.example .env.testing
          php artisan key:generate --force
          php artisan key:generate --env=testing --force

      - name: Run backend tests
        env:
          APP_ENV: testing
          DB_CONNECTION: pgsql
          DB_HOST: postgres
          DB_PORT: 5432
          DB_DATABASE: tour_catalog_test
          DB_USERNAME: tour_user
          DB_PASSWORD: tour_password
        run: php artisan test

  frontend:
    name: Frontend Build
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: apps/frontend

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: apps/frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm install

      - name: Build frontend
        run: npm run build
